name: Release (Linux + manifest)

# The macOS .dmg is built, SIGNED, NOTARIZED, and published LOCALLY via
# `scripts/release-macos.sh` (the signing identity lives in the developer's
# login keychain — there is no certificate in CI). Publishing that GitHub
# Release triggers this workflow, which:
#   1. builds the Linux x64 .AppImage (no signing needed) and attaches it to
#      the same release, and
#   2. opens a clawket/clawket PR flipping components.json#desktop from null to
#      the release tag.
#
# Windows is intentionally not built. Re-run manually for an existing tag via
# `workflow_dispatch` if the Linux build or the bump PR needs to be retried.
#
# Required org-level secret: CLAWKET_RELEASE_PAT (contents:write +
# pull_requests:write across the clawket org — for the bump-manifest PR).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach the Linux build to + bump (e.g. v0.1.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  linux-appimage:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Linux bundle dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential curl wget file libssl-dev
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared packages
        run: pnpm -r --filter=./packages/* build
      - name: Build Linux .AppImage
        run: pnpm --filter @clawket/desktop exec tauri build --bundles appimage
      - name: Attach .AppImage to the release (stable, version-less name)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APPIMAGE=$(ls -t apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          # Stable name so the landing page can link
          # /releases/latest/download/Clawket-Linux-x86_64.AppImage forever.
          cp "$APPIMAGE" "Clawket-Linux-x86_64.AppImage"
          gh release upload "$TAG" "Clawket-Linux-x86_64.AppImage" --repo "$GITHUB_REPOSITORY" --clobber
